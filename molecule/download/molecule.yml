---
# This scenario actually downloads the ollama archive and verifies its SHA256
# checksum. It is intentionally excluded from the CI matrix because the ollama
# archive is ~1.5 GB and would make CI runs prohibitively slow. Run it manually
# when changes to the download or checksum logic need end-to-end validation:
#
#   molecule test --scenario-name download

driver:
  name: docker

platforms:
  - name: instance
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2404}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible

scenario:
  test_sequence:
    # - dependency
    # - cleanup
    - destroy
    - syntax
    - create
    # - prepare
    - converge
    - idempotence
    # - side_effect
    - verify
    # - cleanup
    - destroy
