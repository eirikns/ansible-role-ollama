---
- name: Stop ollama service
  ansible.builtin.systemd:
    name: ollama
    state: stopped
    enabled: false
  failed_when: false

- name: Remove ollama systemd service unit
  ansible.builtin.file:
    path: /etc/systemd/system/ollama.service
    state: absent
  notify: Reload systemd daemon

- name: Flush handlers after removing service unit
  ansible.builtin.meta: flush_handlers

- name: Remove ollama binary
  ansible.builtin.file:
    path: "{{ ollama_check_file_path }}"
    state: absent

- name: Remove ollama lib directory
  ansible.builtin.file:
    path: "{{ ollama_path_prefix }}/lib/ollama"
    state: absent

- name: Remove ollama user
  ansible.builtin.user:
    name: "{{ ollama_user }}"
    state: absent
    remove: true

- name: Remove ollama group
  ansible.builtin.group:
    name: "{{ ollama_group }}"
    state: absent
  failed_when: false

- name: Remove ollama data directory
  ansible.builtin.file:
    path: "{{ ollama_user_home }}"
    state: absent
